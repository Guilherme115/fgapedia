name: Enviar Nova Prova
description: Contribua com uma prova antiga para ajudar outros estudantes da FCTE UNB.
title: "[Nova Prova]: <Nome da Matéria>"
labels: ["nova-prova"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por contribuir para a **FGApédia**!
        Preencha os dados abaixo com atenção e anexe o PDF da prova.

  - type: input
    id: professor
    attributes:
      label: Professor(a)
      description: Nome do professor que aplicou a prova.
      placeholder: Ex: João Silva
    validations:
      required: true

  - type: input
    id: subject
    attributes:
      label: Matéria
      description: Nome da disciplina.
      placeholder: Ex: Cálculo 1
    validations:
      required: true

  - type: input
    id: semester
    attributes:
      label: Semestre
      description: Em qual semestre a prova foi aplicada?
      placeholder: Ex: 2023.1
    validations:
      required: true

  - type: dropdown
    id: exam_type
    attributes:
      label: Tipo de Avaliação
      description: Selecione qual foi o tipo desta prova.
      options:
        - "P1 (Primeira Prova)"
        - "P2 (Segunda Prova)"
        - "P3 (Terceira Prova)"
        - "Exame Especial (Substitutiva)"
        - "Teste / Quiz"
        - "Trabalho / Projeto"
        - "Outros"
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Dificuldade
      description: Como você avalia a dificuldade desta prova? (1 = Muito Fácil, 5 = Muito Difícil)
      options:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
    validations:
      required: true

  - type: checkboxes
    id: has_answer_key
    attributes:
      label: Gabarito e Resolução
      description: Essa prova possui as respostas?
      options:
        - label: Sim, o arquivo contém o gabarito ou a resolução da prova.
          required: false

  - type: textarea
    id: tips
    attributes:
      label: Dica de Ouro (Opcional)
      description: Tem alguma dica sobre essa prova ou sobre a matéria desse professor? Compartilhe com os colegas!
      placeholder: Ex: O professor tirou 80% dessa prova da Lista 3...
    validations:
      required: false

  - type: textarea
    id: pdf_attachment
    attributes:
      label: Anexar PDF da Prova
      description: Arraste e solte o arquivo PDF da prova aqui embaixo.
      placeholder: Faça o upload do PDF aqui...
    validations:
      required: true
