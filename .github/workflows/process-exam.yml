name: Processar Nova Prova

on:
  issues:
    types: [opened]

jobs:
  process-exam:
    if: contains(github.event.issue.labels.*.name, 'nova-prova')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@b4ffde65f46336ab88953be40243d320d3780369 # v4.1.1

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f525247833159c03af0c39 # v4.0.2
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Ghostscript
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Process Issue Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node scripts/process-issue.js

      - name: Commit and Push changes
        # Só fará commit se o script não tiver falhado (exit 0)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/exams.json public/exams/
          # Commit will fail if there are no changes, which is fine, we use || true
          git commit -m "feat(data): add exam from issue #${{ github.event.issue.number }}" || true
          git push
